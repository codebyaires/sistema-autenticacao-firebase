<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Victor Gabriel, Peterson Ruivo, Vitor Augusto">
    <title>Login | Sistema de Autenticação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>🔐 Login</h1>
        
        <div class="form-group">
            <input type="email" id="email" placeholder="E-mail" autocomplete="email">
        </div>
        
        <div class="form-group">
            <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
        </div>
        
        <button class="btn btn-email" onclick="loginEmail()">Entrar</button>
        <button class="btn btn-google" onclick="loginGoogle()">Google</button>
        
        <div id="status"></div>

        <div style="text-align: center; margin-top: 15px;">
            <p style="font-size: 14px; color: #555;">
                Ainda não tem conta? <a href="criar_conta.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Cadastre-se</a>
            </p>
        </div>

        <div style="text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;">
            <p style="font-size: 12px; color: #888; margin: 0;">
                Desenvolvido por <strong>Victor Gabriel, Peterson Ruivo e Vitor Augusto</strong>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
